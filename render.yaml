services:
  - type: web
    name: carolina-nail-design-api
    env: node
    plan: free
    buildCommand: if [ -f backend/package.json ]; then npm --prefix backend install; else npm install; fi
    startCommand: if [ -f backend/src/server.js ]; then node backend/src/server.js; else node src/server.js; fi
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_ALTER_SYNC
        value: false
      - key: DB_SSL
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: carolina-nail-design-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: SMTP_TRANSPORT
        value: smtp
      - key: CORS_ORIGIN
        value: '*'

databases:
  - name: carolina-nail-design-db
    plan: free
    databaseName: carolina_nail_design
    user: carolina_user
